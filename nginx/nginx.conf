server {
    listen 80;
    server_name localhost;

    # 1. Route API traffic directly to the votes-api
    location /api/ {
        proxy_pass http://votes-api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # 2. Route all other traffic to your Node.js server
    location / {
        proxy_pass http://votes-ui/; 
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;

        # IMPORTANT: These headers are required for Socket.io WebSockets to work through Nginx
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}