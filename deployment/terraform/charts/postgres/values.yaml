# Default values
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.
microservice:
  name: postgres
  namespace: default
  env: prod
  image: "postgres:14-alpine"
  PullPolicy: Always
  profile: docker
  type: ClusterIP
  replicas: 1

hpa:
  minReplicas: 1
  maxReplicas: 2

persistence:
  enabled: false